name: ESLint

on:
  push:
    branches:
      - main
      - Goals
      - Goals&OFF
      - "Goals&OFF"
      - 'Goals&OFF'
  pull_request:
    branches:
      - main

jobs:
  eslint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run ESLint (ignore warnings, only fail on errors)
        run: |
          npx eslint . \
            --ext .js,.jsx,.ts,.tsx \
            --max-warnings=1000000

